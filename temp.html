<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F6F1EA">
  <title>디지온도 · 순환소</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app">
    <a class="float-info" href="about.html">i</a>

    <div class="statusbar">
      <span>9:41</span>
      <span class="statusbar__right"><span>●●●</span><span>100</span></span>
    </div>

    <header class="header">
      <div class="header__loc">내 온도 · <span id="userName"></span></div>
      <h1 class="header__title" style="font-size:22px">한 바퀴 돌아올수록<br>온도가 <span class="accent">오릅니다.</span></h1>
    </header>

    <div class="temp-card">
      <div class="temp-card__row">
        <span class="temp-card__label">DIGI · TEMPERATURE</span>
        <span class="temp-card__delta">↑ <span id="delta">0.7</span> 이번 학기</span>
      </div>
      <div class="temp-card__value"><span id="tempValue">37.2</span><small>°C</small></div>
      <div class="temp-card__bar"><div class="temp-card__fill" id="tempFill"></div></div>
      <div class="temp-card__ticks">
        <span>36.5°</span>
        <span>예약 우선권 40°</span>
      </div>
    </div>

    <div class="temp-stats">
      <div class="temp-stat">
        <div class="temp-stat__label">예약 우선권</div>
        <div class="temp-stat__value"><span id="stat1">37.2°</span> <small>/ 40°</small></div>
      </div>
      <div class="temp-stat">
        <div class="temp-stat__label">굿즈 교환</div>
        <div class="temp-stat__value"><span id="stat2">240P</span> <small>/ 500P</small></div>
      </div>
      <div class="temp-stat">
        <div class="temp-stat__label">대여 내역</div>
        <div class="temp-stat__value"><span id="stat3">7</span> <small>· 진행 1</small></div>
      </div>
    </div>

    <div class="section-title">가까운 순환소</div>
    <div class="map" id="map">
      <div class="map__label" style="top:8px;left:12px">학정</div>
      <div class="map__label" style="top:8px;right:12px">기숙사</div>
      <div class="map__label" style="bottom:8px;left:12px">E5</div>
      <div class="map__label" style="bottom:8px;right:12px">대강의동</div>
    </div>

    <div class="map-list" id="spotList"></div>

    <div style="height: 8px"></div>
  </div>

  <nav class="nav">
    <a href="index.html"><span class="nav__icon">⌂</span>홈</a>
    <a href="loop.html"><span class="nav__icon">↻</span>빌리고</a>
    <a href="story.html"><span class="nav__icon">◯</span>스토리</a>
    <a href="temp.html" class="is-active"><span class="nav__icon">◐</span>내 온도</a>
  </nav>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const m = Sunhwanso.meta;
    document.getElementById('userName').textContent = m.userName;
    document.getElementById('tempValue').textContent = m.userTemp.toFixed(1);
    document.getElementById('delta').textContent = m.userTempDelta.toFixed(1);
    document.getElementById('stat1').textContent = m.userTemp.toFixed(1) + '°';
    document.getElementById('stat2').textContent = m.userPoints + 'P';
    document.getElementById('stat3').textContent = m.userLoops;

    // bar fill: scale 36.5~40 → 0~100%
    const pct = Math.min(100, Math.max(0, ((m.userTemp - 36.5) / (40 - 36.5)) * 100));
    setTimeout(() => { document.getElementById('tempFill').style.width = pct + '%'; }, 200);

    // Map pins
    const map = document.getElementById('map');
    Sunhwanso.spots.forEach((s, i) => {
      const pin = document.createElement('div');
      if (i === 0) {
        pin.className = 'map__pin';
        pin.innerHTML = '<span>1</span>';
      } else {
        pin.className = 'map__pin--dot';
        pin.style.position = 'absolute';
      }
      pin.style.left = s.x + '%';
      pin.style.top = s.y + '%';
      map.appendChild(pin);
    });

    // Spot list
    const list = document.getElementById('spotList');
    list.innerHTML = Sunhwanso.spots.map((s) => `
      <div class="map-item">
        <div>
          <div class="map-item__name">${s.name}</div>
          <div class="map-item__loc">${s.loc}</div>
        </div>
        <div class="map-item__stock ${s.low ? 'map-item__stock--low' : ''}">
          ${s.low ? '준비 중' : '재고 ' + s.stock}
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
