<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F6F1EA">
  <title>NFC 스토리 · 순환소</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app">
    <a class="float-info" href="about.html">i</a>

    <div class="statusbar">
      <span>9:41</span>
      <span class="statusbar__right"><span>●●●</span><span>100</span></span>
    </div>

    <div id="content"></div>
  </div>

  <nav class="nav">
    <a href="index.html"><span class="nav__icon">⌂</span>홈</a>
    <a href="loop.html"><span class="nav__icon">↻</span>빌리고</a>
    <a href="story.html" class="is-active"><span class="nav__icon">◯</span>스토리</a>
    <a href="temp.html"><span class="nav__icon">◐</span>내 온도</a>
  </nav>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const id = Sunhwanso.qs('id');
    const root = document.getElementById('content');

    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function renderItemStory(item) {
      const tlHtml = item.timeline.map((t, i) => `
        <div class="timeline__item">
          <div class="timeline__num ${i === 0 ? '' : 'timeline__num--mute'}">${esc(t.n)}</div>
          <div class="timeline__body">
            <div class="timeline__user">${esc(t.user)}</div>
            <div class="timeline__meta">${esc(t.date)} · ${esc(t.event)}</div>
            ${t.msg ? `<div class="timeline__msg">"${esc(t.msg)}"</div>` : ''}
          </div>
        </div>
      `).join('');

      const captionSuffix = item.captionSuffix || '번째';

      root.innerHTML = `
        <a class="back" href="index.html">홈으로</a>
        <div class="story-tag">TAG #${esc(item.id)} · 락커 ${esc(item.locker)}</div>

        <div class="story-quote">
          <div class="story-quote__label">SUNHWANSO · STORY</div>
          <div class="story-quote__text">${esc(item.headline)}</div>
          <div class="story-quote__caption">${esc(item.caption)}<strong>${item.nextNum}${captionSuffix}</strong></div>
        </div>

        <div class="section-title">여정 · TIMELINE</div>
        <div class="timeline">${tlHtml}</div>

        <button class="cta" onclick="toggleCompose()">+ 내 이야기 남기기</button>
        <div class="compose" id="compose">
          <textarea id="msg" placeholder="다음 사용자에게 남길 한마디 (선택)"></textarea>
          <div class="compose__row">
            <span class="compose__hint">익명으로 게시됩니다 · 최대 100자</span>
            <button class="cta" style="margin:0;width:auto;padding:10px 18px" onclick="submitMsg('${esc(item.id)}', ${item.nextNum})">게시</button>
          </div>
        </div>

        <div style="height:16px"></div>
      `;
    }

    function renderFeed() {
      // No ?id= — show recent activity feed across all items
      const items = Sunhwanso.listItems();
      const recent = [];
      items.forEach((it) => {
        it.timeline.slice(0, 2).forEach((t) => recent.push({ item: it, entry: t }));
      });

      const cards = recent.map(({ item, entry }) => `
        <a class="card" href="story.html?id=${item.id}" style="display:flex;flex-direction:row;gap:14px;padding:14px;align-items:center">
          <div style="width:48px;height:48px;border-radius:10px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none">${item.emoji}</div>
          <div style="min-width:0;flex:1">
            <div style="font-size:11px;color:var(--terra);font-family:var(--font-mono);margin-bottom:2px">${esc(entry.n)} · ${esc(item.name)}</div>
            <div style="font-size:13px;font-weight:600;margin-bottom:2px">${esc(entry.user)} · ${esc(entry.event)}</div>
            <div style="font-size:11px;color:var(--clay);font-family:var(--font-mono)">${esc(entry.date)}</div>
            ${entry.msg ? `<div style="margin-top:6px;font-size:12px;color:var(--ink);line-height:1.5">"${esc(entry.msg)}"</div>` : ''}
          </div>
        </a>
      `).join('');

      root.innerHTML = `
        <header class="header">
          <div class="header__loc">📰 SUNHWANSO · STORY FEED</div>
          <h1 class="header__title">최근 <span class="accent">이야기들.</span></h1>
          <div class="header__sub">옷마다 NFC 태그에 대면 그 옷의 전체 이야기가 펼쳐져요.</div>
        </header>
        <div style="display:flex;flex-direction:column;gap:8px;padding:8px 16px">
          ${cards}
        </div>
        <div style="height:16px"></div>
      `;
    }

    function renderNotFound() {
      root.innerHTML = `
        <div class="empty">
          <div class="empty__icon">🏷</div>
          <div class="empty__title">아직 등록되지 않은 태그예요.</div>
          <div class="empty__desc">
            TAG #${esc(id || '???')}<br><br>
            이 NFC 태그는 아직 어떤 옷과도 연결되지 않았습니다.<br>
            순환소 1호점에서 등록을 도와드릴게요.
          </div>
          <a class="cta empty__cta" href="index.html" style="display:inline-block;text-decoration:none;width:auto;padding:14px 24px">홈으로</a>
        </div>
      `;
    }

    window.toggleCompose = function () {
      document.getElementById('compose').classList.toggle('is-open');
    };

    window.submitMsg = function (itemId, nextNum) {
      const msg = document.getElementById('msg').value.trim();
      if (!msg) {
        Sunhwanso.showToast('한 글자 이상 남겨주세요');
        return;
      }
      Sunhwanso.showToast(`${nextNum}번째 이야기로 기록됨 · +10P`);
      document.getElementById('msg').value = '';
      document.getElementById('compose').classList.remove('is-open');
    };

    if (!id) {
      renderFeed();
    } else {
      const item = Sunhwanso.getItem(id);
      if (!item) renderNotFound();
      else renderItemStory(item);
    }
  </script>
</body>
</html>
